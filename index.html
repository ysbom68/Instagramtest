<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
}

/* container holds image + login fields */
.container {
  position: relative;
  display: inline-block;
}

/* center image */
.center {
  display: block;
  margin-left: auto;
  margin-right: auto;
}

/* login form positioned over image */
.login-box {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* invisible input boxes */
input {
  background: transparent;
  border: none;
  outline: none;
  color: black;
  font-size: 16px;
  margin: 10px;
}

/* optional button */
button {
  margin-top: 10px;
  padding: 8px 16px;
}
</style>

</head>
<body>

<div class="container">

  <img src="insta.png" class="center" width="300">

  <div class="login-box">
    <input type="text" placeholder="Username">
    <br>
    <input type="password" placeholder="Password">
    <br>
    <button>Login</button>
  </div>

</div>

</body>
</html>
