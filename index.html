<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
  font-family: San Fransisco, sans-serif;
  text-align: center;
}

/* container holds image + login fields */
.container {
  position: relative;
  display: inline-block;
}

/* bigger image */
.center {
  display: block;
  margin-left: auto;
  margin-right: auto;
  width: 800px;
}

/* login form positioned over image */
.login-box {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* invisible inputs but bigger typing area */
input {
  background: transparent;
  border: none;
  outline: none;
  color: black;
  font-size: 20px;
  margin: 15px;
  width: 250px;
}

/* button */
button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
}
</style>

</head>
<body>

<div class="container">

<img src="insta.png" class="center">

<div class="login-box">
<input type="text" placeholder="Mobile number, username or email">
<br>
<input type="password" placeholder="Password">
<br>
<button>Login</button>
</div>

</div>

</body>
</html>
